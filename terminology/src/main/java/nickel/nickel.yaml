#
# Nickel 节点类型

#
# 逻辑节点
#

- 中文: "逻辑节点"
  英文: "Execute Node"
  定义: "执行指定逻辑的节点。"
  出处:
  - 类: "moe.qingu.nickel.command.node.execute.ExecuteNode"

- 中文: "中继逻辑节点"
  英文: "Relay Execute Node"
  定义: "可在执行子节点完成前后运行指定逻辑的逻辑节点。"
  出处:
  - 类: "moe.qingu.nickel.command.node.execute.RelayExecuteNode"

