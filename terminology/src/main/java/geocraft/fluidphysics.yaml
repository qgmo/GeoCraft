- 中文: "溯源流动"
  英文: null
  定义: "溯源下落与溯源搬运的统称。"
  出处: "https://www.mcmod.cn/item/904888.html"

- 中文: "溯源算法"
  英文: null
  定义: "基于广度优先搜索、按流动等级剪枝的流体源搜索算法。"
  出处: "https://www.mcmod.cn/item/904888.html"

