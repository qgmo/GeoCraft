ver: 1
group: 综合
cases:
  - name: 综合-多类型混合全命中
    matcher: '{name:"水",data:{level:8},tags:[1,2]}'
    target: '{name:"水",data:{level:8,static:1b},tags:[3,2,1],extra:"x"}'
    expected: true
  - name: 综合-深层数值错
    matcher: '{name:"水",data:{level:8},tags:[1,2]}'
    target: '{name:"水",data:{level:7,static:1b},tags:[3,2,1],extra:"x"}'
    expected: false
  - name: 综合-列表元素缺失
    matcher: '{name:"水",data:{level:8},tags:[1,2]}'
    target: '{name:"水",data:{level:8},tags:[1,3]}'
    expected: false
  - name: 综合-空匹配器通配复杂目标
    matcher: '{}'
    target: '{a:{b:[1,2]},c:"x",d:1.5f}'
    expected: true
  - name: 综合-字符串对整型全错
    matcher: '{a:1}'
    target: '{a:"1"}'
    expected: false
  - name: 综合-布尔假字面量即字节0
    matcher: '{flag:false}'
    target: '{flag:0b}'
    expected: true
  - name: 综合-布尔假字面量对字节1
    matcher: '{flag:false}'
    target: '{flag:1b}'
    expected: false
  - name: 综合-复合列表双层子集
    matcher: '{items:[{id:"geocraft:water"}],ver:1b}'
    target: '{items:[{id:"geocraft:lava",num:1},{id:"geocraft:water",num:2}],ver:1b,world:"主世界"}'
    expected: true
  - name: 综合-复合列表期望超量
    matcher: '{items:[{id:"a"},{id:"b"},{id:"c"}]}'
    target: '{items:[{id:"a"},{id:"b"}]}'
    expected: false
  - name: 综合-列表内复合内复合全命中
    matcher: '{w:{rooms:[{door:{lock:1b}}]}}'
    target: '{w:{rooms:[{door:{lock:1b,color:"红"},size:4},{door:{lock:0b}}],name:"家"},t:1}'
    expected: true
  - name: 综合-列表内复合内复合最深键错
    matcher: '{w:{rooms:[{door:{lock:1b}}]}}'
    target: '{w:{rooms:[{door:{lock:0b,color:"红"},size:4}],name:"家"},t:1}'
    expected: false
  - name: 方向-整体子集正向
    matcher: '{d:{x:1},l:[1]}'
    target: '{d:{x:1,y:2},l:[2,1],s:"e"}'
    expected: true
  - name: 方向-整体子集互换
    matcher: '{d:{x:1,y:2},l:[2,1],s:"e"}'
    target: '{d:{x:1},l:[1]}'
    expected: false
  - name: 深度-列表内复合目标多一层
    matcher: '{l:[{a:1}]}'
    target: '{l:[{a:{b:1}}]}'
    expected: false
