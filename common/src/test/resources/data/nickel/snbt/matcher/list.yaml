ver: 1
group: 列表
cases:
  - name: 空列表匹配器-对空列表
    matcher: '{l:[]}'
    target: '{l:[]}'
    expected: true
  - name: 空列表匹配器-对非空列表
    matcher: '{l:[]}'
    target: '{l:[1]}'
    expected: false
  - name: 同序-全命中
    matcher: '{l:[1,2,3]}'
    target: '{l:[1,2,3]}'
    expected: true
  - name: 乱序-顺序无关
    matcher: '{l:[1,2,3]}'
    target: '{l:[3,1,2]}'
    expected: true
  - name: 子集-目标多余元素不影响
    matcher: '{l:[1,2]}'
    target: '{l:[3,2,1]}'
    expected: true
  - name: 缺元素-一个期望无命中
    matcher: '{l:[1,2]}'
    target: '{l:[1,3]}'
    expected: false
  - name: 期望多于元素-直接失败
    matcher: '{l:[1,2,3]}'
    target: '{l:[1,2]}'
    expected: false
  - name: 重复期望-去重后匹配单元素列表
    matcher: '{l:[1,1]}'
    target: '{l:[1]}'
    expected: true
  - name: 重复期望-去重后匹配二元列表
    matcher: '{l:[1,1]}'
    target: '{l:[1,2]}'
    expected: true
  - name: 重复期望-去重后仍无命中
    matcher: '{l:[1,1]}'
    target: '{l:[2]}'
    expected: false
  - name: 目标重复-重复元素满足期望
    matcher: '{l:[1,2]}'
    target: '{l:[1,1,2,2]}'
    expected: true
  - name: 目标重复-长度够但元素缺
    matcher: '{l:[1,2]}'
    target: '{l:[1,1,1]}'
    expected: false
  - name: 字符串列表-乱序命中
    matcher: '{l:["a","b"]}'
    target: '{l:["b","a"]}'
    expected: true
  - name: 字符串列表-缺元素
    matcher: '{l:["a","b"]}'
    target: '{l:["a","c"]}'
    expected: false
  - name: 复合元素-子集语义命中任一元素
    matcher: '{l:[{id:"water"}]}'
    target: '{l:[{id:"lava"},{id:"water",amount:8}]}'
    expected: true
  - name: 复合元素-无命中
    matcher: '{l:[{id:"water"}]}'
    target: '{l:[{id:"lava"}]}'
    expected: false
  - name: 嵌套列表-内层列表命中
    matcher: '{l:[[1]]}'
    target: '{l:[[2,3],[1]]}'
    expected: true
  - name: 嵌套列表-内层列表无命中
    matcher: '{l:[[1]]}'
    target: '{l:[[2,3],[4]]}'
    expected: false
  - name: 类型错-列表匹配器对复合标签
    matcher: '{l:[]}'
    target: '{l:{}}'
    expected: false
  - name: 类型错-整型列表对字节列表
    matcher: '{l:[1]}'
    target: '{l:[1b]}'
    expected: false
  - name: 类型错-列表匹配器对标量
    matcher: '{l:[1]}'
    target: '{l:1}'
    expected: false
  - name: 类型错-复合匹配器对列表
    matcher: '{l:{}}'
    target: '{l:[]}'
    expected: false
  - name: 类型错-单精度列表对双精度列表
    matcher: '{l:[1.5f]}'
    target: '{l:[1.5d]}'
    expected: false
  - name: 字符串重复期望-去重后匹配单元素列表
    matcher: '{l:["a","a"]}'
    target: '{l:["a"]}'
    expected: true
  - name: 字符串重复期望-去重后无命中
    matcher: '{l:["a","a"]}'
    target: '{l:["b"]}'
    expected: false
  - name: 复合元素-深层列表命中
    matcher: '{l:[{a:[1]}]}'
    target: '{l:[{a:[2,1],b:3}]}'
    expected: true
  - name: 复合元素-深层列表无命中
    matcher: '{l:[{a:[1]}]}'
    target: '{l:[{a:[2]}]}'
    expected: false
  - name: 深度-双层列表同构
    matcher: '{l:[[1]]}'
    target: '{l:[[1]]}'
    expected: true
  - name: 深度-期望列表多一层
    matcher: '{l:[[1]]}'
    target: '{l:[1]}'
    expected: false
  - name: 深度-目标列表多一层
    matcher: '{l:[1]}'
    target: '{l:[[1]]}'
    expected: false
  - name: 深度-列表内复合期望更深
    matcher: '{l:[{a:[[1]]}]}'
    target: '{l:[{a:[1]}]}'
    expected: false
