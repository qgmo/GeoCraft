# NBTPath 路径语法解析用例表（Claude Generated）
# 字段：名（用例名）、输入（路径原文）、期望（期望的 NBTPath#toString，节点间以 . 连接）、
#       长度（期望节点数）、异常（true = 期望解析报错）、键（期望异常信息组件树中含有的翻译键）、
#       剩余（解析停止后输入流中应剩余的原文）
# 注意：NBTPath#toString 与解析语法不完全往返（如 [0] 前也会加 .），期望值按 toString 现状书写。
- 名: 简单键
