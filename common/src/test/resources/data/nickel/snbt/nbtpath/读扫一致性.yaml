- 名: 空引号名
  输入: '""'
  读者: 报错
  扫描: 通过
  注: 同空引号方法名——读者对 readString 结果查空串报空名，扫描器仅用游标位移判断名非空，识别不出空引号名；为预期行为：扫描器只做浅层语法扫描，不做这一深度的校验
- 名: 引号纯空白名
  输入: '" "'
  读者: 通过
  扫描: 通过
  注: 引号名原样读出、不剥离空白，纯空白是合法名，读者与扫描器结论一致（空引号名仍是读者报错/扫描通过的差异，见上）
- 名: 方法参数表截断
  输入: 'a.values('
  读者: 报错
  扫描: 信号
  注: 截断的方法实参表——读者 expect(')') 在 EOF 处报错，扫描器 expectOrEnd(')') 在 EOF 处发信号；与方括号截断同族，为预期行为
- 名: 制表符全空白输入
  输入: "\t"
  读者: 报错
