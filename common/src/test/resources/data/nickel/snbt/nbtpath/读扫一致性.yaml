  输入: a[]
  读者: 通过
  扫描: 通过
- 名: 列表复合过滤
  输入: 'a[{x:1}]'
  读者: 通过
  扫描: 通过
- 名: 根复合后接键
  输入: '{x:1}.a'
  读者: 通过
  扫描: 通过
- 名: 键值过滤
  输入: 'a{x:1}'
  读者: 通过
  扫描: 通过
- 名: 引号键
  输入: '"a b".c'
  读者: 通过
  扫描: 通过
- 名: 已注册方法
  输入: a.values()
  读者: 通过
  扫描: 通过
- 名: 空白停止
  输入: 'a b'
  读者: 通过
  扫描: 通过
- 名: 连续点空名
  输入: a..b
  读者: 报错
  扫描: 报错
- 名: 非法分隔符
  输入: a!
  读者: 报错
  扫描: 报错
- 名: 空方法名
  输入: ()
  读者: 报错
  扫描: 报错
- 名: 小数索引
  输入: a[1.5]
  读者: 报错
  扫描: 报错
- 名: 非数字索引
  输入: a[b]
  读者: 报错
  扫描: 报错
- 名: 裸中文键
  输入: 名字
  读者: 报错
  扫描: 报错
- 名: 索引后空白
  输入: 'a[2 ]'
  读者: 报错
  扫描: 报错
- 名: 空输入
  输入: ''
  读者: 报错
  扫描: 信号
  注: 扫描器把空输入视作待补全的截断输入
- 名: 纯空白输入
  输入: ' '
  读者: 报错
  扫描: 信号
  注: 同空输入，扫描器发 EOF 信号
- 名: 尾随点
  输入: a.
  读者: 报错
  扫描: 信号
  注: 截断输入——读者在点后 EOF 处报错（尾随点不被静默接受），扫描器视作待补全的截断输入发 EOF 信号；与空输入同族
- 名: 方括号截断
  输入: a[
  读者: 报错
  扫描: 信号
  注: 截断输入——读者在 EOF 处报错，扫描器（scanPathArray 开头 canRead 检查）视作待补全的截断输入发 EOF 信号；与空输入、尾随点属同类截断，为预期行为
- 名: 索引未闭合
  输入: a[0
  读者: 报错
  扫描: 信号
  注: 同方括号截断——读者因缺失 ] 报错，扫描器读完索引后 expectOrEnd(']') 在 EOF 处发信号；为预期行为
- 名: 过滤复合截断
  输入: 'a{x:1'
  读者: 报错
  扫描: 信号
  注: 截断的键值过滤复合——读者因复合未闭合报错，扫描器扫复合体时在 EOF 处发信号；为预期行为
- 名: 引号未闭合
  输入: '"a'
  读者: 报错
  扫描: 信号
  注: 未闭合引号串——读者 readString 报 strNoClose，扫描器 scanString 在 EOF 处发信号（InputReader.scanString）；为预期行为
- 名: 未定义方法
  输入: nosuchmeth(1)
  读者: 报错
  扫描: 通过
  注: 扫描器只扫方法实参语法，不检查方法是否注册；结论不一致，为预期行为
- 名: 非法正则
  输入: 'pattern("[")'
  读者: 报错
  扫描: 通过
  注: 处理器在读者侧解析期执行并报错，扫描器不执行处理器
- 名: 类型编号越界
  输入: type(99)
  读者: 报错
  扫描: 通过
  注: 同非法正则，扫描器不执行处理器
- 名: 复合不在首位
  输入: 'a.{x:1}'
  读者: 报错
  扫描: 通过
  注: 扫描器缺少复合过滤器位置检查，与读者结论不一致——为预期行为：扫描器只做浅层语法扫描，不做这一深度的校验
- 名: 空引号方法名
  输入: '""()'
  读者: 报错
  扫描: 通过
  注: 扫描器仅用游标位移判断方法名非空，识别不出空引号名——为预期行为：扫描器只做浅层语法扫描，不做这一深度的校验
- 名: 三连索引毗连
  输入: a[0][1][2]
  读者: 通过
  扫描: 通过
- 名: 列表过滤毗连索引
  输入: 'a[{x:1}][0]'
  读者: 通过
  扫描: 通过
- 名: 索引后毗连复合
  输入: 'a[0]{x:1}'
  读者: 报错
  扫描: 通过
  注: 同复合不在首位——读者在 readPathCompound 里按路径长度报复合错位，扫描器缺少该位置检查；为预期行为：扫描器只做浅层语法扫描，不做这一深度的校验
- 名: 引号方法名
  输入: '"values"()'
  读者: 通过
  扫描: 通过
