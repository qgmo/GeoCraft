# NBTPathReader 与 NBTPathScanner 行为对照用例表（Claude Generated）
# 字段：名（用例名）、输入（路径原文）、
#       读者（NBTPathReader 期望结论：通过 / 报错）、
#       扫描（NBTPathScanner 期望结论：通过 / 报错 / 信号，信号 = NickelScanEOFSignal）、
#       注（两者结论不一致时的说明；有注的不一致为预期行为）
- 名: 简单键
  输入: a
  读者: 通过
  扫描: 通过
- 名: 嵌套键
  输入: a.b.c
  读者: 通过
  扫描: 通过
- 名: 列表索引
  输入: a[0]
  读者: 通过
  扫描: 通过
