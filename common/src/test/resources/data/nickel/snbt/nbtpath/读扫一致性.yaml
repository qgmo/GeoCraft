- 名: 过滤器含函数调用
  输入: 'a{x:bool(1)}'
  读者: 通过
  扫描: 通过
  注: 已注册函数在过滤器内经继承的 SNBT 机制正常求值（须加载 SNBTOperations 注册表，生产环境由 FML 加载）
- 名: 过滤器内未注册函数
  输入: 'a{x:nosuchfunc(1)}'
  读者: 报错
  扫描: 通过
  注: 读者经 SNBTReader 解析过滤复合并做函数决议，未注册函数 panic（OPT_UNDEFINED）；扫描器 scanCompound 只扫语法、不做函数决议；与未定义方法同族，为预期行为
- 名: 方法后毗连复合
  输入: 'a.values(){x:1}'
  读者: 报错
  扫描: 通过
  注: 同复合不在首位/索引后毗连复合——读者在 readPathCompound 按路径长度报复合错位，扫描器缺少该位置检查；为预期行为：扫描器只做浅层语法扫描，不做这一深度的校验
- 名: 方法后毗连列表过滤
  输入: 'a.values()[{x:1}]'
  读者: 通过
  扫描: 通过
- 名: 无参调用有参方法
  输入: type()
  读者: 报错
  扫描: 通过
  注: 同未定义方法——type 无零参重载，读者决议失败报 method.undefined；扫描器只扫实参语法不做决议；为预期行为
- 名: 带参方法后接键
  输入: 'a.type("INT").x'
