plugins {
    id 'java'
    id 'xyz.wagyourtail.unimined' version '1.4.23-kappa'
}

repositories {
    // Other repositories described by default:
    // CleanroomMC: https://maven.cleanroommc.com
    exclusiveContent {
        forRepository {
            maven {
                name 'CurseMaven'
                url 'https://cursemaven.com'
            }
        }
        filter {
            includeGroup 'curse.maven'
        }
    }
    exclusiveContent {
        forRepository {
            maven {
                name 'Modrinth'
                url 'https://api.modrinth.com/maven'
            }
        }
        filter {
            includeGroup 'maven.modrinth'
        }
    }
    maven { url = 'https://jitpack.io' }
    maven { url = 'https://mod-buildcraft.com/maven' }
    mavenLocal() // Must be last for caching to work
}

version = mod_version
group = root_package

base {
    archivesName = mod_id
}

evaluationDependsOn(':common')

configurations {
    modTestImplementation
    testImplementation.extendsFrom minecraft, minecraftLibraries, modTestImplementation // Unimined 把MC直接暴力放进了main里，所以这里需要手动依赖
}

java {
    toolchain {
        languageVersion.set(JavaLanguageVersion.of(25))
    }
}

unimined.minecraft {
    version "1.12.2"
    mappings {
        mcp("stable", "39-1.12")
    }
    cleanroom {
        loader "0.5.14-alpha"
    }
    defaultRemapJar = false //RetroForgeGradle 的ASM版本非常新,足够处理Java 25的字节码

    mods {
        remap(configurations.modTestImplementation)
    }
}

dependencies {
    if (enable_junit_testing.toBoolean()) {
        testImplementation 'org.junit.jupiter:junit-jupiter:5.7.1'
        testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    }
    compileOnly project(':common')
    testImplementation project(':common')
    testImplementation files(project(':common').sourceSets.test.output) //好奇怪为什么必须这样才能依赖到测试项目
    modTestImplementation 'com.github.jbredwards:fluidlogged-api:1.12.2-Latest-SNAPSHOT'
}

compileTestJava {
    sourceCompatibility = targetCompatibility = JavaVersion.VERSION_25
}

test {
    useJUnitPlatform()
    javaLauncher.set(javaToolchains.launcherFor {
        languageVersion = JavaLanguageVersion.of(25)
    })
    if (show_testing_output.toBoolean()) {
        testLogging {
            showStandardStreams = true
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}